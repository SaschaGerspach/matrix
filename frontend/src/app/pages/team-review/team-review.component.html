<h2>Team Review</h2>

@if (loading()) {
  <mat-progress-spinner mode="indeterminate" diameter="32"></mat-progress-spinner>
} @else if (data().length === 0) {
  <p>No pending assignments to review.</p>
} @else {
  <table mat-table [dataSource]="data()" class="full-width">
    <ng-container matColumnDef="employee_name">
      <th mat-header-cell *matHeaderCellDef>Employee</th>
      <td mat-cell *matCellDef="let row">{{ row.employee_name }}</td>
    </ng-container>

    <ng-container matColumnDef="skill_name">
      <th mat-header-cell *matHeaderCellDef>Skill</th>
      <td mat-cell *matCellDef="let row">{{ row.skill_name }}</td>
    </ng-container>

    <ng-container matColumnDef="category_name">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let row">{{ row.category_name }}</td>
    </ng-container>

    <ng-container matColumnDef="level">
      <th mat-header-cell *matHeaderCellDef>Level</th>
      <td mat-cell *matCellDef="let row">{{ row.level }} / 5</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip-set>
          <mat-chip>{{ row.status }}</mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-raised-button color="primary" (click)="confirm(row.id)">Confirm</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
