<mat-toolbar color="primary">
  <span>Skill Matrix</span>
  <nav class="nav-links">
    <a mat-button routerLink="/my-skills" routerLinkActive="active">My Skills</a>
    @if (isTeamLead()) {
      <a mat-button routerLink="/team-review" routerLinkActive="active">Team Review</a>
      <a mat-button routerLink="/skill-gaps" routerLinkActive="active">Skill Gaps</a>
      <a mat-button routerLink="/team-comparison" routerLinkActive="active">Team Comparison</a>
    }
    <a mat-button routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a mat-button routerLink="/employees" routerLinkActive="active">Employees</a>
    @if (isAdmin()) {
      <a mat-button routerLink="/admin" routerLinkActive="active">Admin</a>
    }
  </nav>
  <span class="spacer"></span>
  <button mat-icon-button (click)="themeService.toggle()" title="Toggle dark mode">
    <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-icon-button [matMenuTriggerFor]="notifMenu" (menuOpened)="loadNotifications()">
    <mat-icon [matBadge]="unreadCount()" [matBadgeHidden]="unreadCount() === 0" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
  </button>
  <mat-menu #notifMenu="matMenu" class="notification-menu">
    <div class="notif-header" (click)="$event.stopPropagation()">
      <strong>Notifications</strong>
      @if (unreadCount() > 0) {
        <button mat-button (click)="markAllAsRead()">Mark all read</button>
      }
    </div>
    @for (n of notifications(); track n.id) {
      <button mat-menu-item [class.unread]="!n.is_read" (click)="markAsRead(n)">
        <span class="notif-message">{{ n.message }}</span>
        <span class="notif-time">{{ n.created_at | date:'short' }}</span>
      </button>
    } @empty {
      <div class="notif-empty" (click)="$event.stopPropagation()">No notifications</div>
    }
  </mat-menu>
  <button mat-button type="button" (click)="logout()">Sign out</button>
</mat-toolbar>

<div class="content">
  <router-outlet />
</div>
